<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic JavaScript Lab</title>
    
    <!-- CSS Section -->
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            transition: background-color 0.3s ease;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 90%;
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h2 { color: #333; }

        input {
            padding: 12px;
            width: 80%;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-bottom: 20px;
            outline: none;
        }

        input:focus { border-color: #007bff; }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 18px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        button:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }

        #resetBtn { background-color: #dc3545; }
        #resetBtn:hover { background-color: #a71d2a; }

        #paragraph {
            margin-top: 20px;
            line-height: 1.6;
            color: #555;
            padding: 15px;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 id="mainHeading">Welcome to JavaScript Lab</h2>
        
        <input type="text" id="userInput" placeholder="Enter new heading text">
        
        <div class="button-group">
            <button id="changeTextBtn">Change Heading</button>
            <button id="bgColorBtn">Change Color</button>
            <button id="fontSizeBtn">Text Size +</button>
            <button id="toggleBtn">Show/Hide</button>
            <button id="resetBtn">Reset All</button>
        </div>

        <p id="paragraph">
            This is a sample paragraph. JavaScript events can dynamically change content in real-time!
        </p>
    </div>

    <!-- JavaScript Section -->
    <script>
        // Elements ko select karna
        const heading = document.getElementById("mainHeading");
        const paragraph = document.getElementById("paragraph");
        const input = document.getElementById("userInput");
        let fontSize = 16;

        // 1. Heading badalne ke liye
        document.getElementById("changeTextBtn").addEventListener("click", () => {
            if (input.value.trim() !== "") {
                heading.innerText = input.value;
                input.value = ""; 
            } else {
                alert("Kuch toh likho!");
            }
        });

        // 2. Random background color ke liye
        document.getElementById("bgColorBtn").onclick = () => {
            const randomColor = Math.floor(Math.random() * 16777215).toString(16);
            document.body.style.backgroundColor = "#" + randomColor;
        };

        // 3. Font size badhane ke liye
        document.getElementById("fontSizeBtn").addEventListener("click", () => {
            fontSize += 2;
            paragraph.style.fontSize = fontSize + "px";
        });

        // 4. Paragraph Toggle (Show/Hide)
        document.getElementById("toggleBtn").addEventListener("click", () => {
            const isHidden = window.getComputedStyle(paragraph).display === "none";
            paragraph.style.display = isHidden ? "block" : "none";
        });

        // 5. Reset button ka logic
        document.getElementById("resetBtn").addEventListener("click", () => {
            heading.innerText = "Welcome to JavaScript Lab";
            paragraph.style.display = "block";
            paragraph.style.fontSize = "16px";
            document.body.style.backgroundColor = "#f4f4f4";
            input.value = "";
            fontSize = 16;
        });
    </script>

</body>
</html>
